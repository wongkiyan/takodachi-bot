[loggers]
keys=root, archive, remotePC

[handlers]
keys=streamHandler, app_dynamic, archive_dynamic, remote_dynamic, app_rotating, archive_rotating, remote_rotating

[formatters]
keys=simpleFormatter, colorFormatter

# ========================================================
# 🎯 系統核心切換開關 (可在這裡一秒決定切換到哪一組)
# ========================================================
[logger_root]
level=INFO
# 💡 預設使用動態日期。若想切換為大小限制滾動模式，請將 app_dynamic 改為 app_rotating
handlers=app_dynamic, streamHandler

[logger_archive]
level=INFO
# 💡 預設使用動態日期。若想切換為大小限制滾動模式，請將 archive_dynamic 改為 archive_rotating
handlers=archive_dynamic, streamHandler
qualname=archive
propagate=0

[logger_remotePC]
level=INFO
# 💡 預設使用動態日期。若想切換為大小限制滾動模式，請將 remote_dynamic 改為 remote_rotating
handlers=remote_dynamic, streamHandler
qualname=remotePC
propagate=0

# ========================================================
# 📂 模式 A：DynamicFileHandler (按日期動態分資料夾)
# 參數對應：(log_folder_name, mode, encoding, delay)
# ========================================================
[handler_app_dynamic]
class=DynamicFileHandler
level=INFO
formatter=simpleFormatter
args=('app_logs', 'a', 'utf-8', True)

[handler_archive_dynamic]
class=DynamicFileHandler
level=INFO
formatter=simpleFormatter
args=('archive_logs', 'a', 'utf-8', True)

[handler_remote_dynamic]
class=DynamicFileHandler
level=INFO
formatter=simpleFormatter
args=('Remote_PC_logs', 'a', 'utf-8', True)

# ========================================================
# 🔄 模式 B：RotatingFileHandler (固定檔名 + 限制 1MB、3個檔案)
# 參數對應：(filename, mode, maxBytes, backupCount, encoding, delay)
# ========================================================
[handler_app_rotating]
class=logging.handlers.RotatingFileHandler
level=INFO
formatter=simpleFormatter
args=('app.log', 'a', 1048576, 3, 'utf-8', True)

[handler_archive_rotating]
class=logging.handlers.RotatingFileHandler
level=INFO
formatter=simpleFormatter
args=('archive.log', 'a', 1048576, 3, 'utf-8', True)

[handler_remote_rotating]
class=logging.handlers.RotatingFileHandler
level=INFO
formatter=simpleFormatter
args=('remote_pc.log', 'a', 1048576, 3, 'utf-8', True)

# ========================================================
# 🖥️ 終端機 (Console) 輸出與日誌格式設定
# ========================================================
[handler_streamHandler]
class=StreamHandler
level=INFO
formatter=colorFormatter
args=()

[formatter_simpleFormatter]
format=[%(asctime)s] - [%(levelname)s]: %(message)s
datefmt=%I:%M:%S %p

[formatter_colorFormatter]
class=colorlog.ColoredFormatter
format=[%(asctime)s] - %(log_color)s[%(levelname)s]%(reset)s - %(message)s
datefmt=%Y-%m-%d %I:%M:%S %p
log_colors={
    'DEBUG': 'white',
    'INFO': 'green',
    'WARNING': 'yellow',
    'ERROR': 'red',
    'CRITICAL': 'red,bg_white'}